  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#d4d4d4">
    <text x="394" y="80"><tspan fill="#7a7a7a">1</tspan>  <tspan fill="#569cd6"># Project Rules</tspan></text>
    <text x="394" y="106"><tspan fill="#7a7a7a">2</tspan></text>
    <text x="394" y="132"><tspan fill="#7a7a7a">3</tspan>  <tspan fill="#9cdcfe">## Stack</tspan></text>
    <text x="394" y="158"><tspan fill="#7a7a7a">4</tspan>  <tspan fill="#ce9178">- Next.js 14+ with the App Router (`/app` directory).</tspan></text>
    <text x="394" y="184"><tspan fill="#7a7a7a">5</tspan>  <tspan fill="#ce9178">- TypeScript strict mode.</tspan></text>
    <text x="394" y="210"><tspan fill="#7a7a7a">6</tspan>  <tspan fill="#ce9178">- Tailwind CSS for styling. shadcn/ui for components.</tspan></text>
    <text x="394" y="236"><tspan fill="#7a7a7a">7</tspan>  <tspan fill="#ce9178">- Server Components by default.</tspan></text>
    <text x="394" y="262"><tspan fill="#7a7a7a">8</tspan></text>
    <text x="394" y="288"><tspan fill="#7a7a7a">9</tspan>  <tspan fill="#9cdcfe">## Conventions</tspan></text>
    <text x="394" y="314"><tspan fill="#7a7a7a">10</tspan> <tspan fill="#ce9178">- Place data-fetching logic inside Server Components.</tspan></text>
    <text x="394" y="340"><tspan fill="#7a7a7a">11</tspan> <tspan fill="#ce9178">- Co-locate components: `app/feature/_components/`.</tspan></text>
    <text x="394" y="366"><tspan fill="#7a7a7a">12</tspan> <tspan fill="#ce9178">- Always type `params` and `searchParams` props.</tspan></text>
    <text x="394" y="392"><tspan fill="#7a7a7a">13</tspan></text>
    <text x="394" y="418"><tspan fill="#7a7a7a">14</tspan> <tspan fill="#9cdcfe">## Forbidden</tspan></text>
    <text x="394" y="444"><tspan fill="#7a7a7a">15</tspan> <tspan fill="#ce9178">- Do not use `getServerSideProps` — App Router only.</tspan></text>
    <text x="394" y="470"><tspan fill="#7a7a7a">16</tspan> <tspan fill="#ce9178">- Do not put secrets in client components.</tspan></text>
  </g>

