<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <rect width="1200" height="800" fill="#1e1e1e"/>

  <g opacity="0.4">
    <rect x="0" y="0" width="48" height="800" fill="#181818"/>
    <rect x="48" y="0" width="320" height="800" fill="#252526"/>
  </g>

  <!-- Pro badge -->
  <g transform="translate(880, 30)">
    <rect width="100" height="28" rx="14" fill="#a855f7"/>
    <text x="50" y="19" text-anchor="middle" font-family="ui-sans-serif, sans-serif" font-size="13" font-weight="700" fill="#fff">★ PRO</text>
  </g>

  <!-- Input box -->
  <rect x="240" y="80" width="720" height="56" rx="6" fill="#252526" stroke="#6366f1" stroke-width="2"/>
  <text x="262" y="104" font-family="ui-sans-serif, sans-serif" font-size="11" fill="#7a7a7a" letter-spacing="1">DESCRIBE YOUR PROJECT</text>
  <text x="262" y="124" font-family="ui-sans-serif, sans-serif" font-size="14" fill="#fff">SaaS app for invoicing freelancers, Next.js + Postgres + Stripe + Auth0</text>

  <!-- Detected stack pills -->
  <g transform="translate(240, 156)" font-family="ui-sans-serif, sans-serif" font-size="12">
    <text x="0" y="14" fill="#7a7a7a">Detected stack:</text>
    <g fill="#fff">
      <rect x="120" y="0" width="74" height="22" rx="11" fill="#1f3a5f"/>
      <text x="157" y="15" text-anchor="middle">nextjs</text>
      <rect x="204" y="0" width="74" height="22" rx="11" fill="#1f3a5f"/>
      <text x="241" y="15" text-anchor="middle">react</text>
      <rect x="288" y="0" width="100" height="22" rx="11" fill="#1f3a5f"/>
      <text x="338" y="15" text-anchor="middle">typescript</text>
      <rect x="398" y="0" width="80" height="22" rx="11" fill="#1f3a5f"/>
      <text x="438" y="15" text-anchor="middle">tailwind</text>
    </g>
  </g>

  <!-- Generated output -->
  <rect x="240" y="200" width="720" height="500" rx="6" fill="#1a1a1a" stroke="#3c3c3c"/>
  <text x="260" y="226" font-family="ui-sans-serif, sans-serif" font-size="12" fill="#7a7a7a" letter-spacing="1">GENERATED · CLAUDE.MD · 1,847 TOKENS</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">
    <text x="260" y="258" fill="#569cd6"># Invoicing SaaS — Project Rules</text>
    <text x="260" y="290" fill="#9cdcfe">## Stack</text>
    <text x="260" y="312" fill="#ce9178">- Next.js 14+ (App Router) on Vercel.</text>
    <text x="260" y="334" fill="#ce9178">- TypeScript strict. Tailwind + shadcn/ui.</text>
    <text x="260" y="356" fill="#ce9178">- Postgres via Drizzle ORM. Stripe SDK for billing.</text>
    <text x="260" y="378" fill="#ce9178">- Auth0 for authentication; SDK in middleware.</text>

    <text x="260" y="412" fill="#9cdcfe">## Domain rules</text>
    <text x="260" y="434" fill="#ce9178">- Money in cents (integer), never float.</text>
    <text x="260" y="456" fill="#ce9178">- Currency stored as ISO 4217 code (USD, EUR).</text>
    <text x="260" y="478" fill="#ce9178">- Invoice statuses: draft|sent|paid|void — enforce as enum.</text>
    <text x="260" y="500" fill="#ce9178">- Tax rates per-jurisdiction; never hardcode.</text>

    <text x="260" y="534" fill="#9cdcfe">## Forbidden</text>
    <text x="260" y="556" fill="#ce9178">- Never log Stripe keys, Auth0 secrets, or full card numbers.</text>
    <text x="260" y="578" fill="#ce9178">- No client-side authorization checks — always verify on server.</text>
    <text x="260" y="600" fill="#ce9178">- Don't bypass Stripe webhooks for state changes — use idempotency.</text>

    <text x="260" y="634" fill="#9cdcfe">## Output style</text>
    <text x="260" y="656" fill="#ce9178">- Show only changed files in diff blocks.</text>
    <text x="260" y="678" fill="#ce9178">- Reference paths from repo root.</text>
  </g>

  <!-- Action buttons -->
  <g transform="translate(720, 720)" font-family="ui-sans-serif, sans-serif" font-size="13">
    <rect width="100" height="34" rx="4" fill="#3c3c3c"/>
    <text x="50" y="22" text-anchor="middle" fill="#cccccc">Regenerate</text>

    <rect x="110" width="100" height="34" rx="4" fill="#3c3c3c"/>
    <text x="160" y="22" text-anchor="middle" fill="#cccccc">Edit prompt</text>

    <rect x="220" width="120" height="34" rx="4" fill="#6366f1"/>
    <text x="280" y="22" text-anchor="middle" fill="#fff" font-weight="600">Save to CLAUDE.md</text>
  </g>
</svg>
